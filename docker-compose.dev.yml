version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wtctrl-dev-postgres
    environment:
      POSTGRES_DB: WintimeControlDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - wintime-control-network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: wtctrl-dev-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./Wintime.Control.API/MQTT/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped
    networks:
      - wintime-control-network

  api:
    build:
      context: .
      dockerfile: Wintime.Control.API/Dockerfile.dev
    container_name: wtctrl-dev-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=WintimeControlDb;Username=postgres;Password=password;
      - MqttSettings__BrokerUrl=mosquitto
    depends_on:
      - postgres
      - mosquitto
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - wintime-control-network

  emulator:
    build:
      context: .
      dockerfile: Wintime.Control.Emulator/Dockerfile.dev
    container_name: wtctrl-dev-emulator
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - Mqtt__BrokerUrl=mqtt://mosquitto:1883
      - MainApi__BaseUrl=http://api:8080
    depends_on:
      api:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    networks:
      - wintime-control-network

volumes:
  postgres_data:
  mosquitto_config:
  mosquitto_data:

networks:
  wintime-control-network:
    driver: bridge