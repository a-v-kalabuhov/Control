version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wtctrl-prod-postgres
    environment:
      POSTGRES_DB: WintimeControlDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - wintime-control-network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: wtctrl-prod-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./Wintime.Control.API/MQTT/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped
    networks:
      - wintime-control-network

  api:
    image: ghcr.io/a-v-kalabuhov/control/api:latest
    container_name: wtctrl-prod-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=WintimeControlDb;Username=postgres;Password=${DB_PASSWORD:-changeme};
      - MqttSettings__BrokerUrl=mosquitto
    depends_on:
      - postgres
      - mosquitto
    restart: unless-stopped
    networks:
      - wintime-control-network

  emulator:
    image: ghcr.io/a-v-kalabuhov/control/emulator:latest
    container_name: wtctrl-prod-emulator
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Mqtt__BrokerUrl=mqtt://mosquitto:1883
      - MainApi__BaseUrl=http://api:8080
    depends_on:
      - api
      - mosquitto
    restart: unless-stopped
    networks:
      - wintime-control-network

volumes:
  postgres_data:
  mosquitto_data:

networks:
  wintime-control-network:
    driver: bridge
