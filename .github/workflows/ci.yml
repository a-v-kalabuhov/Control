name: CI

on:
  pull_request:
    branches: [ "master" ]  # запускать CI на PR в master
  push:
    branches: [ "master" ]  # опционально: проверять master после merge

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"  # подстрой под версию проекта

      # сюда можно добавить шаги по запуску Docker / docker-compose
      # для интеграционных тестов с БД и внешними сервисами

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build